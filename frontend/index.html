<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🔐 AI-Based Security System</h1>

    <!-- ========================= -->
    <!-- DEBUG CONSOLE -->
    <!-- ========================= -->
    <div class="card">
        <h3>System Status</h3>
        <p id="debug">Waiting...</p>
    </div>

    <!-- ========================= -->
    <!-- REGISTER SECTION -->
    <!-- ========================= -->
    <div class="card">
        <h2>Register Face</h2>

        <input type="text" id="name" placeholder="Enter name" required>
        <input type="email" id="email" placeholder="Enter email" required>
        <input type="file" id="image" accept="image/*">

        <button onclick="register()">Register</button>

        <p id="registerStatus"></p>
    </div>

    <!-- ========================= -->
    <!-- CAMERA SECTION -->
    <!-- ========================= -->
    <div class="card">
        <h2>Live Camera</h2>

        <button onclick="startCamera()">Start Camera</button>

        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <p id="status"></p>
        <h3 id="faceResult">Waiting for face...</h3>
    </div>

    <!-- ========================= -->
    <!-- SCRIPT -->
    <!-- ========================= -->
    <script src="script.js"></script>

    <!-- ========================= -->
    <!-- DEBUG SCRIPT -->
    <!-- ========================= -->
    <script>
        // simple system check
        fetch("http://127.0.0.1:8000/docs")
            .then(() => {
                document.getElementById("debug").innerText = "Backend Connected ✅";
            })
            .catch(() => {
                document.getElementById("debug").innerText = "Backend NOT Connected ❌";
            });
    </script>

</body>
</html>
