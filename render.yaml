services:
  - type: web
    name: ai-security-system-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/AI_SECURITY_SYSTEM
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /health
    autoDeploy: true